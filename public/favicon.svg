  <ellipse cx="32" cy="27" rx="17" ry="15" fill="url(#sk)" filter="url(#gl)"/>
  <!-- Jaw area -->
  <path d="M17 35 C16 43 19 50 23 52 L24 52 C21 49 18 44 18 38Z" fill="#c0394d" opacity=".65"/>
  <path d="M47 35 C48 43 45 50 41 52 L40 52 C43 49 46 44 46 38Z" fill="#c0394d" opacity=".65"/>
  <path d="M23 44 Q32 50 41 44 L40 53 Q32 57 24 53Z" fill="#8b1a28"/>
  <!-- Teeth -->
  <rect x="24" y="50" width="3" height="5" rx="1" fill="#f0eaf5" opacity=".9"/>
  <rect x="28.5" y="50" width="3" height="6" rx="1" fill="#f0eaf5" opacity=".9"/>
  <rect x="33" y="50" width="3" height="5" rx="1" fill="#f0eaf5" opacity=".9"/>
  <!-- Nose -->
  <path d="M29 34 L32 30 L35 34 L34 38 L30 38Z" fill="#07060b" opacity=".85"/>
  <!-- Left eye -->
  <ellipse cx="23" cy="26" rx="5.5" ry="5" fill="#07060b" opacity=".9"/>
