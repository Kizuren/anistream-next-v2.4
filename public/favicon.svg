<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%"><stop offset="0%" stop-color="#1c0812"/><stop offset="100%" stop-color="#07060b"/></radialGradient>
    <radialGradient id="sk" cx="50%" cy="35%" r="55%"><stop offset="0%" stop-color="#d4455a"/><stop offset="60%" stop-color="#c0394d"/><stop offset="100%" stop-color="#8b1a28"/></radialGradient>
    <radialGradient id="eg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff4060" stop-opacity=".9"/><stop offset="100%" stop-color="#8b1a28" stop-opacity=".3"/></radialGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Horns -->
  <path d="M15 5 C12 14 17 23 21 27 C17 21 12 13 15 5Z" fill="#c0394d" opacity=".85"/>
  <path d="M49 5 C52 14 47 23 43 27 C47 21 52 13 49 5Z" fill="#c0394d" opacity=".85"/>
