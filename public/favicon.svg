  <ellipse cx="23" cy="26" rx="1.5" ry="2.8" fill="#07060b"/>
  <ellipse cx="22" cy="24.5" rx=".8" ry="1.1" fill="rgba(255,255,255,.4)" transform="rotate(-10,22,24.5)"/>
  <!-- Right eye -->
  <ellipse cx="41" cy="26" rx="5.5" ry="5" fill="#07060b" opacity=".9"/>
  <ellipse cx="41" cy="26" rx="3.5" ry="3.2" fill="url(#eg)" filter="url(#gl)"/>
  <ellipse cx="41" cy="26" rx="1.5" ry="2.8" fill="#07060b"/>
  <ellipse cx="40" cy="24.5" rx=".8" ry="1.1" fill="rgba(255,255,255,.4)" transform="rotate(-10,40,24.5)"/>
  <!-- Crack -->
  <path d="M32 12 L31 19 L33 23 L32 27" fill="none" stroke="rgba(139,26,40,.55)" stroke-width=".8" stroke-linecap="round"/>
